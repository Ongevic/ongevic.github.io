baseURL = "https://ongevic.github.io/"
title = "Victor Nyabutiongera - Academic Portfolio"
languageCode = "en-us"

[module]
  [[module.imports]]
    path = "github.com/hugo-toha/toha/v4"
  [[module.imports.mounts]]
    source = "assets"
    target = "assets"
  [[module.imports.mounts]]
    source = "hugo_stats.json"
    target = "assets"
  [[module.imports.mounts]]
    source = "static"
    target = "static"

enableRobotsTXT = true

[params]
  # Enable dark theme
  darkMode = true
  # Set git repository
  gitRepo = "https://github.com/Ongevic/ongevic.github.io"
