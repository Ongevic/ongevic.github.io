# Personal Research Website Configuration
title: "Victor Nyabuti Ong'era - Research"
description: "PhD Candidate in Linguistics specializing in theoretical syntax, language acquisition, and experimental linguistics"
author: "Victor Nyabuti Ong'era"
email: "victor.ongera@example.com"
url: "https://ongevic.github.io"
baseurl: ""

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /:title/

# Collections
collections:
  publications:
    output: true
    permalink: /publications/:title/
  projects:
    output: true
    permalink: /projects/:title/
  talks:
    output: true
    permalink: /talks/:title/

# Defaults for easier content management
defaults:
  - scope:
      path: ""
      type: "publications"
    values:
      layout: "publication"
  - scope:
      path: ""
      type: "projects"
    values:
      layout: "project"
  - scope:
      path: ""
      type: "talks"
    values:
      layout: "talk"

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/ 